# ── Shell ──
shell /usr/bin/zsh

# ── Font ──
font_family      IosevkaTerm Nerd Font
bold_font        IosevkaTerm Nerd Font Bold
italic_font      IosevkaTerm Nerd Font Italic
bold_italic_font IosevkaTerm Nerd Font Bold Italic
font_size        10.0

# ── Window ──
background_opacity 0.70
window_padding_width 6
confirm_os_window_close 0

# ── Cursor ──
cursor_shape     beam

# ── Colors (generated by matugen) ──
include matugen.conf

# ── Tab bar ──
tab_bar_style powerline
tab_bar_min_tabs 1
tab_title_template "{title}"

# ── Keybinds ──
# Windows (nuevas ventanas de kitty)
map ctrl+shift+enter new_os_window

# Tabs - crear/cerrar
map ctrl+shift+t     new_tab
map ctrl+shift+w     close_tab

# Tabs - navegación
map alt+1            goto_tab 1
map alt+2            goto_tab 2
map alt+3            goto_tab 3
map alt+4            goto_tab 4
map alt+5            goto_tab 5
map alt+6            goto_tab 6
map alt+7            goto_tab 7
map alt+8            goto_tab 8
map alt+9            goto_tab 9
map ctrl+tab         next_tab
map ctrl+shift+tab   previous_tab

# Tabs - mover de posición
map ctrl+shift+right move_tab_forward
map ctrl+shift+left  move_tab_backward

# Tabs - renombrar
map ctrl+shift+r     set_tab_title

# Font size
map ctrl+shift+plus  change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+0     change_font_size all 0

# ── Image protocol ──
allow_remote_control yes
