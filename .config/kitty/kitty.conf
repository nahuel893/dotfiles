# ── Shell ──
shell /usr/bin/zsh

# ── Font ──
font_family      IosevkaTerm Nerd Font
bold_font        IosevkaTerm Nerd Font Bold
italic_font      IosevkaTerm Nerd Font Italic
bold_italic_font IosevkaTerm Nerd Font Bold Italic
font_size        10.0

# ── Window ──
background_opacity 0.70
window_padding_width 6
confirm_os_window_close 0

# ── Cursor ──
cursor_shape     beam

# ── Colors (generated by matugen) ──
include matugen.conf

# ── Tab bar ──
tab_bar_style powerline
tab_bar_min_tabs 1
tab_title_template "{title}"

# ── Keybinds ──
map ctrl+shift+enter new_os_window
map ctrl+shift+t     new_tab
map ctrl+shift+w     close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab

# ── Image protocol ──
allow_remote_control yes
